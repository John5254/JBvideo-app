<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JB Video App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>JBeloved VIDEO LIBRARY</h2>

<div class="form-box">
  <input type="text" id="title" placeholder="Video title">
  
  <input type="text" id="videoURL" placeholder="Video URL" oninput="autoThumbnail()">
  
  <input type="text" id="thumbnail" placeholder="Thumbnail URL (auto for YouTube)">
  
  <button id="addBtn" onclick="addVideo()">Add Video</button>
</div>

<div id="videoGrid" class="grid"></div>

<script type="module" src="app.js"></script>

</body>

</html>
