<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Player</title>
</head>

<body>

<button onclick="history.back()">⬅ Back</button>

<div id="player"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const url = params.get("url");

  const player = document.getElementById("player");

  if (url.endsWith(".mp4")) {
    player.innerHTML = `<video src="${url}" controls autoplay width="100%"></video>`;
  }

  else if (url.includes("youtube")) {
    const id = url.split("v=")[1]?.split("&")[0];
    player.innerHTML = `<iframe width="100%" height="300" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }

  else if (url.includes("facebook")) {
    player.innerHTML = `<iframe width="100%" height="300" src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}" allowfullscreen></iframe>`;
  }

  else {
    player.innerHTML = "Unsupported video";
  }
</script>

</body>

</html>
